<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}CNPJ Dashboard{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg:       #0a0c0f;
  --surface:  #111318;
  --card:     #161a22;
  --border:   #1e2330;
  --accent:   #00e5ff;
  --accent2:  #7c3aed;
  --accent3:  #10b981;
  --warn:     #f59e0b;
  --danger:   #ef4444;
  --text:     #e2e8f0;
  --muted:    #64748b;
  --mono:     'Space Mono', monospace;
  --sans:     'Syne', sans-serif;
}
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html { scroll-behavior: smooth; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: var(--sans);
  min-height: 100vh;
  display: flex;
  overflow-x: hidden;
}

/* ── Sidebar ─────────────────────────────────────────────── */
.sidebar {
  width: 240px;
  min-height: 100vh;
  background: var(--surface);
  border-right: 1px solid var(--border);
  display: flex;
  flex-direction: column;
  position: fixed;
  top: 0; left: 0;
  z-index: 100;
}

.sidebar-logo {
  padding: 28px 24px 20px;
  border-bottom: 1px solid var(--border);
}
.sidebar-logo .brand {
  font-size: 11px;
  letter-spacing: .2em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--mono);
}
.sidebar-logo h1 {
  font-size: 22px;
  font-weight: 800;
  color: var(--accent);
  letter-spacing: -.02em;
  margin-top: 2px;
  line-height: 1.1;
}
.sidebar-logo span { color: var(--text); }

.sidebar-nav { flex: 1; padding: 16px 0; }
.nav-section {
  font-size: 10px;
  letter-spacing: .15em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--mono);
  padding: 12px 24px 6px;
}
.nav-link {
  display: flex;
  align-items: center;
  gap: 12px;
  padding: 11px 24px;
  text-decoration: none;
  color: var(--muted);
  font-size: 14px;
  font-weight: 600;
  transition: all .18s;
  border-left: 3px solid transparent;
  position: relative;
}
.nav-link:hover, .nav-link.active {
  color: var(--text);
  background: var(--card);
  border-left-color: var(--accent);
}
.nav-link.active { color: var(--accent); }
.nav-icon { font-size: 18px; width: 22px; text-align: center; }

.sidebar-footer {
  padding: 16px 24px;
  border-top: 1px solid var(--border);
  font-family: var(--mono);
  font-size: 10px;
  color: var(--muted);
}
.status-dot {
  display: inline-block;
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--accent3);
  margin-right: 6px;
  animation: pulse 2s infinite;
}
@keyframes pulse {
  0%, 100% { opacity: 1; }
  50% { opacity: .4; }
}

/* ── Main ────────────────────────────────────────────────── */
.main {
  margin-left: 240px;
  flex: 1;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.topbar {
  height: 56px;
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  padding: 0 32px;
  gap: 12px;
  position: sticky;
  top: 0;
  z-index: 50;
}
.topbar-title {
  font-size: 13px;
  font-weight: 700;
  letter-spacing: .05em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--mono);
}
.topbar-sep { color: var(--border); }
.topbar-page { color: var(--text); font-family: var(--mono); font-size: 13px; }

.content { padding: 32px; flex: 1; }

/* ── Cards ───────────────────────────────────────────────── */
.card {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 8px;
  overflow: hidden;
}
.card-header {
  padding: 16px 20px;
  border-bottom: 1px solid var(--border);
  display: flex;
  align-items: center;
  justify-content: space-between;
  gap: 12px;
}
.card-title {
  font-size: 12px;
  font-weight: 700;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  font-family: var(--mono);
}
.card-body { padding: 20px; }

/* ── Buttons ─────────────────────────────────────────────── */
.btn {
  display: inline-flex;
  align-items: center;
  gap: 8px;
  padding: 9px 18px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 700;
  font-family: var(--sans);
  cursor: pointer;
  border: none;
  transition: all .18s;
  text-decoration: none;
}
.btn-primary {
  background: var(--accent);
  color: #000;
}
.btn-primary:hover { background: #33ecff; box-shadow: 0 0 20px rgba(0,229,255,.3); }
.btn-ghost {
  background: transparent;
  color: var(--muted);
  border: 1px solid var(--border);
}
.btn-ghost:hover { color: var(--text); border-color: var(--muted); }
.btn-danger { background: var(--danger); color: #fff; }
.btn-success { background: var(--accent3); color: #000; }
.btn-sm { padding: 6px 12px; font-size: 12px; }

/* ── Badge ───────────────────────────────────────────────── */
.badge {
  display: inline-flex;
  align-items: center;
  padding: 2px 8px;
  border-radius: 20px;
  font-size: 11px;
  font-weight: 700;
  font-family: var(--mono);
}
.badge-cyan   { background: rgba(0,229,255,.12); color: var(--accent); }
.badge-green  { background: rgba(16,185,129,.12); color: var(--accent3); }
.badge-purple { background: rgba(124,58,237,.15); color: #a78bfa; }
.badge-amber  { background: rgba(245,158,11,.12); color: var(--warn); }

/* ── Grid utils ──────────────────────────────────────────── */
.grid { display: grid; gap: 20px; }
.grid-3 { grid-template-columns: repeat(3, 1fr); }
.grid-4 { grid-template-columns: repeat(4, 1fr); }
.grid-2 { grid-template-columns: repeat(2, 1fr); }

/* ── Table ───────────────────────────────────────────────── */
.tbl-wrap {
  overflow-x: auto;
  border-radius: 6px;
  border: 1px solid var(--border);
}
table { width: 100%; border-collapse: collapse; font-size: 13px; }
thead th {
  background: var(--surface);
  padding: 10px 14px;
  text-align: left;
  font-family: var(--mono);
  font-size: 10px;
  letter-spacing: .1em;
  text-transform: uppercase;
  color: var(--muted);
  border-bottom: 1px solid var(--border);
  white-space: nowrap;
}
tbody tr { border-bottom: 1px solid var(--border); transition: background .12s; }
tbody tr:hover { background: rgba(255,255,255,.02); }
tbody tr:last-child { border-bottom: none; }
tbody td { padding: 9px 14px; color: var(--text); }

/* ── Form ────────────────────────────────────────────────── */
.input, .select, textarea {
  width: 100%;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: 6px;
  color: var(--text);
  font-family: var(--mono);
  font-size: 13px;
  padding: 10px 14px;
  transition: border-color .18s;
  outline: none;
  -webkit-appearance: none;
}
.input:focus, .select:focus, textarea:focus { border-color: var(--accent); }
.select option { background: var(--card); }

/* ── Scrollbar ───────────────────────────────────────────── */
::-webkit-scrollbar { width: 6px; height: 6px; }
::-webkit-scrollbar-track { background: var(--bg); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
::-webkit-scrollbar-thumb:hover { background: var(--muted); }

/* ── Toast ───────────────────────────────────────────────── */
#toast-container {
  position: fixed;
  bottom: 24px;
  right: 24px;
  z-index: 9999;
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.toast {
  padding: 12px 18px;
  border-radius: 6px;
  font-size: 13px;
  font-weight: 600;
  max-width: 360px;
  animation: slide-in .2s ease;
  border-left: 3px solid;
}
.toast-info    { background: var(--card); border-color: var(--accent);  color: var(--text); }
.toast-success { background: var(--card); border-color: var(--accent3); color: var(--text); }
.toast-error   { background: var(--card); border-color: var(--danger);  color: var(--text); }
@keyframes slide-in {
  from { transform: translateX(60px); opacity: 0; }
  to   { transform: translateX(0);    opacity: 1; }
}

/* ── Loader ──────────────────────────────────────────────── */
.spinner {
  width: 20px; height: 20px;
  border: 2px solid var(--border);
  border-top-color: var(--accent);
  border-radius: 50%;
  animation: spin .7s linear infinite;
  display: inline-block;
}
@keyframes spin { to { transform: rotate(360deg); } }
</style>
{% block extra_head %}{% endblock %}
</head>
<body>

<aside class="sidebar">
  <div class="sidebar-logo">
    <div class="brand">Receita Federal</div>
    <h1>CNPJ<span>⚡</span></h1>
  </div>
  <nav class="sidebar-nav">
    <div class="nav-section">Painel</div>
    <a href="/" class="nav-link {% if request.endpoint == 'dashboard.index' %}active{% endif %}">
      <span class="nav-icon">◉</span> Dashboard
    </a>
    <div class="nav-section">Dados</div>
    <a href="/updater/" class="nav-link {% if request.blueprint == 'updater' %}active{% endif %}">
      <span class="nav-icon">⬇</span> Atualizar Remessa
    </a>
    <a href="/query/" class="nav-link {% if request.blueprint == 'query' %}active{% endif %}">
      <span class="nav-icon">⌖</span> Consultas SQL
    </a>
  </nav>
  <div class="sidebar-footer">
    <span class="status-dot"></span>Sistema Online
  </div>
</aside>

<div class="main">
  <div class="topbar">
    <span class="topbar-title">CNPJ</span>
    <span class="topbar-sep">/</span>
    <span class="topbar-page">{% block page_name %}Dashboard{% endblock %}</span>
  </div>
  <div class="content">
    {% block content %}{% endblock %}
  </div>
</div>

<div id="toast-container"></div>

<script>
function toast(msg, type='info') {
  const el = document.createElement('div');
  el.className = `toast toast-${type}`;
  el.textContent = msg;
  document.getElementById('toast-container').appendChild(el);
  setTimeout(() => el.remove(), 4000);
}
</script>
{% block scripts %}{% endblock %}
</body>
</html>
